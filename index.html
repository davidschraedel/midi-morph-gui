<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI Morph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Jost', 'sans-serif'],
            },
            colors: {
              bauhaus: {
                red: '#D92121',
                blue: '#0F4C81',
                yellow: '#F0C808',
                black: '#1A1A1A',
                charcoal: '#2A2A2A',
                white: '#F0EBE3',
              }
            },
            borderWidth: {
              '3': '3px',
              '4': '4px',
              '6': '6px',
            },
            boxShadow: {
              'solid': '4px 4px 0px 0px rgba(26,26,26,1)',
              'solid-sm': '2px 2px 0px 0px rgba(26,26,26,1)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #F0EBE3;
        color: #2A2A2A;
      }

      ::selection {
        background-color: #F0C808;
        color: #1A1A1A;
      }

      .bauhaus-btn,
      .bauhaus-input {
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }

      .bauhaus-btn {
        cursor: pointer;
      }

      .bauhaus-btn.shadow-solid-sm:hover {
        transform: translate(-1px, -1px);
        box-shadow: 4px 4px 0px 0px rgba(26, 26, 26, 1);
      }

      .bauhaus-btn.shadow-solid-sm:active {
        transform: translate(2px, 2px);
        box-shadow: none;
      }

      .bauhaus-input:hover,
      .bauhaus-input:focus {
        border-color: #0F4C81;
        outline: none;
      }

      select.bauhaus-input {
        cursor: pointer;
      }

      input[type=range].bauhaus-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        background: transparent;
        margin: 10px 0;
        cursor: pointer;
      }

      input[type=range].bauhaus-slider:focus {
        outline: none;
      }

      input[type=range].bauhaus-slider::-webkit-slider-runnable-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        background: #2A2A2A;
        border: 2px solid #2A2A2A;
      }

      input[type=range].bauhaus-slider::-webkit-slider-thumb {
        height: 22px;
        width: 22px;
        border: 2px solid #1A1A1A;
        background-color: #0F4C81;
        cursor: grab;
        -webkit-appearance: none;
        margin-top: -9px;
        transition: transform 0.12s ease;
      }

      input[type=range].bauhaus-slider:active::-webkit-slider-thumb {
        cursor: grabbing;
        transform: scale(1.05);
      }

      input[type=range].bauhaus-slider::-moz-range-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        background: #2A2A2A;
        border: 2px solid #2A2A2A;
      }

      input[type=range].bauhaus-slider::-moz-range-thumb {
        height: 22px;
        width: 22px;
        border: 2px solid #1A1A1A;
        background-color: #0F4C81;
        cursor: grab;
        border-radius: 0;
        transition: transform 0.12s ease;
      }

      input[type=range].bauhaus-slider:active::-moz-range-thumb {
        cursor: grabbing;
        transform: scale(1.05);
      }

      input[type=range].bauhaus-slider.thumb-red::-webkit-slider-thumb {
        background-color: #D92121;
      }

      input[type=range].bauhaus-slider.thumb-yellow::-webkit-slider-thumb {
        background-color: #F0C808;
      }

      input[type=range].bauhaus-slider.thumb-blue::-webkit-slider-thumb {
        background-color: #0F4C81;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 12px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: #F0EBE3;
        border-left: 2px solid #1A1A1A;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #D92121;
        border: 2px solid #1A1A1A;
      }

      .piano-roll-container::-webkit-scrollbar {
        height: 12px;
      }

      .piano-roll-container::-webkit-scrollbar-track {
        background: #F0EBE3;
        border-top: 2px solid #1A1A1A;
      }

      .piano-roll-container::-webkit-scrollbar-thumb {
        background-color: #D92121;
        border: 2px solid #1A1A1A;
      }

    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
