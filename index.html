<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI Morph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Jost', 'sans-serif'],
            },
            colors: {
              bauhaus: {
                red: '#D92121',
                blue: '#0F4C81',
                yellow: '#F0C808',
                black: '#1A1A1A',
                white: '#F7F7F7',
              }
            },
            borderWidth: {
              '3': '3px',
              '4': '4px',
              '6': '6px',
            },
            boxShadow: {
              'solid': '4px 4px 0px 0px rgba(26,26,26,1)',
              'solid-sm': '2px 2px 0px 0px rgba(26,26,26,1)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #F7F7F7;
        color: #1A1A1A;
      }

      ::selection {
        background-color: #F0C808;
        color: #1A1A1A;
      }

      input[type=range].bauhaus-slider {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
        margin: 10px 0;
      }

      input[type=range].bauhaus-slider:focus {
        outline: none;
      }

      input[type=range].bauhaus-slider::-webkit-slider-runnable-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        background: #1A1A1A;
        border: 2px solid #1A1A1A;
      }

      input[type=range].bauhaus-slider::-webkit-slider-thumb {
        height: 24px;
        width: 24px;
        border: 3px solid #1A1A1A;
        background-color: #0F4C81;
        cursor: pointer;
        -webkit-appearance: none;
        margin-top: -10px;
        box-shadow: 2px 2px 0px 0px rgba(26,26,26,1);
      }

      input[type=range].bauhaus-slider.thumb-red::-webkit-slider-thumb {
        background-color: #D92121;
      }

      input[type=range].bauhaus-slider.thumb-yellow::-webkit-slider-thumb {
        background-color: #F0C808;
      }

      input[type=range].bauhaus-slider.thumb-blue::-webkit-slider-thumb {
        background-color: #0F4C81;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 12px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: #F7F7F7;
        border-left: 3px solid #1A1A1A;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #D92121;
        border: 2px solid #1A1A1A;
      }

      .piano-roll-container::-webkit-scrollbar {
        height: 12px;
      }

      .piano-roll-container::-webkit-scrollbar-track {
        background: #F7F7F7;
        border-top: 3px solid #1A1A1A;
      }

      .piano-roll-container::-webkit-scrollbar-thumb {
        background-color: #D92121;
        border: 2px solid #1A1A1A;
      }

      .grid-bg {
        background-image:
          linear-gradient(to right, rgba(26,26,26,0.1) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(26,26,26,0.2) 2px, transparent 2px);
        background-size: 40px 32px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
